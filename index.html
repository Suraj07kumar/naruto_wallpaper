<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NARUTO — Live Wallpaper</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cyan: #00e5ff;
      --cyan-dim: rgba(0,229,255,0.15);
      --dark: #03050a;
      --darker: #010308;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ───── ANIMATED BACKGROUND ───── */
    .scene {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden;
    }

    /* Star field */
    .stars {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 60% 40%, rgba(0,229,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 15% 65%, rgba(0,229,255,0.3) 0%, transparent 100%);
      animation: twinkle 6s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.5; }
      to   { opacity: 1; }
    }

    /* Slow aurora waves */
    .aurora {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 100% 50% at 20% 50%, rgba(0,229,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 80% 40% at 80% 60%, rgba(0,100,255,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 50% 100%, rgba(0,229,255,0.04) 0%, transparent 50%);
      animation: auroraShift 15s ease-in-out infinite alternate;
    }
    @keyframes auroraShift {
      0%   { transform: translateX(0) translateY(0) scale(1); opacity: 0.6; }
      50%  { transform: translateX(3%) translateY(-2%) scale(1.05); opacity: 1; }
      100% { transform: translateX(-3%) translateY(2%) scale(0.97); opacity: 0.7; }
    }

    /* Scanline texture */
    .scanlines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
    }

    /* Floating orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      animation: orbFloat ease-in-out infinite alternate;
    }
    .orb1 { width:400px; height:400px; background:rgba(0,229,255,0.07); top:-10%; left:-10%; animation-duration:12s; }
    .orb2 { width:300px; height:300px; background:rgba(0,80,255,0.06); bottom:0; right:-5%; animation-duration:9s; animation-delay:-4s; }
    .orb3 { width:200px; height:200px; background:rgba(0,229,255,0.05); top:40%; left:50%; animation-duration:14s; animation-delay:-7s; }
    @keyframes orbFloat {
      from { transform: translateY(0) translateX(0); }
      to   { transform: translateY(-40px) translateX(20px); }
    }

    /* ───── CONTENT ───── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 4rem;
      gap: 0;
    }

    /* Top eyebrow */
    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.55em;
      color: var(--cyan);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.7s 0.2s forwards;
      margin-bottom: 1rem;
    }

    /* Big title */
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5.5rem, 20vw, 14rem);
      line-height: 0.88;
      letter-spacing: 0.06em;
      text-align: center;
      color: #fff;
      text-shadow:
        0 0 40px rgba(0,229,255,0.35),
        0 0 120px rgba(0,229,255,0.15);
      opacity: 0;
      animation: fadeUp 0.8s 0.35s forwards;
      position: relative;
    }
    /* Glitch slice effect */
    .title::before, .title::after {
      content: 'NARUTO';
      position: absolute; inset: 0;
      overflow: hidden;
    }
    .title::before {
      color: var(--cyan);
      clip-path: polygon(0 20%, 100% 20%, 100% 35%, 0 35%);
      animation: glitch1 8s infinite;
      opacity: 0.6;
    }
    .title::after {
      color: #fff;
      clip-path: polygon(0 65%, 100% 65%, 100% 75%, 0 75%);
      animation: glitch2 8s infinite;
      opacity: 0.4;
    }
    @keyframes glitch1 {
      0%,94%,100% { transform: translateX(0); opacity: 0; }
      95% { transform: translateX(-4px); opacity: 0.6; }
      97% { transform: translateX(4px); opacity: 0.6; }
      99% { transform: translateX(0); opacity: 0; }
    }
    @keyframes glitch2 {
      0%,94%,100% { transform: translateX(0); opacity: 0; }
      95% { transform: translateX(4px); opacity: 0.4; }
      97% { transform: translateX(-4px); opacity: 0.4; }
      99% { transform: translateX(0); opacity: 0; }
    }

    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.65rem, 2vw, 0.85rem);
      letter-spacing: 0.45em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-top: 0.6rem;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.5s forwards;
    }

    /* ── Video container ── */
    .video-shell {
      width: 100%;
      max-width: 860px;
      position: relative;
      opacity: 0;
      animation: fadeUp 1s 0.7s forwards;
    }

    /* Corner brackets */
    .video-shell::before,
    .video-shell::after {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: var(--cyan);
      border-style: solid;
      z-index: 2;
    }
    .video-shell::before {
      top: -6px; left: -6px;
      border-width: 2px 0 0 2px;
    }
    .video-shell::after {
      bottom: -6px; right: -6px;
      border-width: 0 2px 2px 0;
    }
    .corner-br::before, .corner-br::after {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: var(--cyan);
      border-style: solid;
      z-index: 2;
    }
    .corner-br::before { top: -6px; right: -6px; border-width: 2px 2px 0 0; }
    .corner-br::after  { bottom: -6px; left: -6px; border-width: 0 0 2px 2px; }

    .video-inner {
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(0,229,255,0.2),
        0 0 60px rgba(0,229,255,0.12),
        0 30px 80px rgba(0,0,0,0.9);
    }

    /* Animated top bar */
    .video-inner::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      z-index: 3;
      animation: scanBar 3s ease-in-out infinite;
    }
    @keyframes scanBar {
      0%   { left: -100%; }
      100% { left: 100%; }
    }

    video {
      width: 100%;
      display: block;
    }

    /* HUD label */
    .hud-label {
      position: absolute;
      top: 0.7rem; left: 0.9rem;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--cyan);
      opacity: 0.7;
      z-index: 4;
      text-transform: uppercase;
    }
    .hud-res {
      position: absolute;
      top: 0.7rem; right: 0.9rem;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.3);
      z-index: 4;
    }

    /* ── Download button ── */
    .btn-wrap {
      margin-top: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 1s forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.9rem;
      padding: 1rem 3rem;
      border: 1px solid var(--cyan);
      border-radius: 3px;
      background: transparent;
      color: var(--cyan);
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: color 0.35s;
      cursor: pointer;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--cyan);
      transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      z-index: 0;
    }
    .btn:hover { color: #000; }
    .btn:hover::before { transform: translateX(0); }
    .btn span, .btn svg { position: relative; z-index: 1; }

    .btn svg {
      width: 14px; height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.3s;
    }
    .btn:hover svg { transform: translateY(3px); }

    /* ── Shared fadeUp ── */
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── Bottom tagline ── */
    .tagline {
      margin-top: 2.5rem;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.15);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.8s 1.2s forwards;
    }
  </style>
</head>
<body>

<!-- Animated background -->
<div class="scene">

</div>

</body>
</html>
